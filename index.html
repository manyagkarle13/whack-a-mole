<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack A Mole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="screen screen--start active" id="startScreen">
      <div class="sky-decor">
        <span class="cloud cloud--one"></span>
        <span class="cloud cloud--two"></span>
        <span class="cloud cloud--three"></span>
        <span class="cloud cloud--four"></span>
      </div>
      <div class="start-ground-decor" aria-hidden="true">
        <span class="flower flower--left"></span>
        <span class="flower flower--right"></span>
        <span class="leaf leaf--left"></span>
        <span class="leaf leaf--right"></span>
      </div>
      <div class="start-title">
        <h1>Whack<br><span>a</span><br>Mole</h1>
      </div>
      <div class="hero">
        <div class="hero-mound">
          <div class="mole mole--hero">
            <span class="ear ear--left"></span>
            <span class="ear ear--right"></span>
            <span class="face"></span>
            <span class="eye eye--left"></span>
            <span class="eye eye--right"></span>
            <span class="nose"></span>
            <span class="tooth tooth--left"></span>
            <span class="tooth tooth--right"></span>
            <span class="arm arm--left"></span>
            <span class="arm arm--right"></span>
            <span class="claw claw--left"></span>
            <span class="claw claw--right"></span>
          </div>
          <div class="dirt dirt--hero"></div>
        </div>
      </div>
      <button class="cta-button" id="playButton" type="button">Play</button>
    </section>

    <section class="screen screen--game" id="gameScreen">
      <div class="hud">
        <div class="stat-card">
          <div class="stat-icon">T</div>
          <div class="stat-value" id="timeValue">15</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">S</div>
          <div class="stat-value" id="scoreValue">0</div>
        </div>
        <div class="status-text" id="statusText">Tap the mole</div>
      </div>

      <div class="playfield">
        <button class="hole" data-hole="0" type="button" aria-label="Hole 1"></button>
        <button class="hole" data-hole="1" type="button" aria-label="Hole 2"></button>
        <button class="hole" data-hole="2" type="button" aria-label="Hole 3"></button>
        <button class="hole" data-hole="3" type="button" aria-label="Hole 4"></button>
        <button class="hole" data-hole="4" type="button" aria-label="Hole 5"></button>
        <button class="hole" data-hole="5" type="button" aria-label="Hole 6"></button>
        <button class="hole" data-hole="6" type="button" aria-label="Hole 7"></button>
        <button class="hole" data-hole="7" type="button" aria-label="Hole 8"></button>
        <button class="hole" data-hole="8" type="button" aria-label="Hole 9"></button>
      </div>

      <div class="hammer-cursor" id="hammerCursor" aria-hidden="true">
        <span class="hammer-head"></span>
        <span class="hammer-handle"></span>
      </div>

      <div class="overlay" id="gameOverlay">
        <div class="overlay-card">
          <h2 id="overlayTitle">Game Over</h2>
          <p id="overlayMessage">Your score: 0</p>
          <button class="cta-button" id="restartButton" type="button">Play Again</button>
          <button class="ghost-button" id="homeButton" type="button">Home</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
